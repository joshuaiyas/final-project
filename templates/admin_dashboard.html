{% extends "base.html" %}
{% block content %}
<div class="content">
  <h2>Welcome, Admin (Commandant)</h2>
  
  <div style="margin:20px 0;">
    <a href="{{ url_for('admin_attendance') }}" class="btn">📊 View All Recorded Attendance</a>
  </div>

  <h3>Generate QR Code for Attendance</h3>
  
  {% for cls in classes %}
  <div class="card">
    <strong>{{ cls.subject }}</strong><br>
    <small>{{ cls.professor }} • {{ cls.schedule }}</small><br><br>
    <a href="{{ url_for('generate_qr', class_id=cls.id) }}" class="btn">Generate QR Code</a>
  </div>
  {% endfor %}
</div>
{% endblock %}
